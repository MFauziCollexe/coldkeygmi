# Example Nginx maintenance/error-page setup for this Laravel app.
# Adjust the paths, server_name, and upstream target to match your server.

server {
    listen 443 ssl http2;
    server_name 101.0.5.107;

    root /var/www/coldkeygmi/public;
    index index.php index.html;

    # Show the static maintenance page when the upstream/app is unavailable.
    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /var/www/coldkeygmi/public;
        internal;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location / {
        try_files $uri $uri/ @laravel_upstream;
    }

    # Option A: reverse proxy to app/upstream (Docker, Node gateway, another Nginx, etc.)
    location @laravel_upstream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_intercept_errors on;
    }

    # Option B: PHP-FPM/Laravel direct. Use this block instead of @laravel_upstream if needed.
    # location / {
    #     try_files $uri $uri/ /index.php?$query_string;
    # }
    #
    # location ~ \.php$ {
    #     include fastcgi_params;
    #     fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    #     fastcgi_param PATH_INFO $fastcgi_path_info;
    #     fastcgi_index index.php;
    #     fastcgi_pass 127.0.0.1:9000;
    #     fastcgi_intercept_errors on;
    # }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
